    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#05050a',
              primary: '#0066ff',
              card: '#0f111a',
              border: '#1e2235',
            },
            fontFamily: {
              sans: ['Inter', 'Sarabun', 'sans-serif'],
            }
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Sarabun', 'Inter', sans-serif;
        background-color: #05050a;
        color: white;
      }
      /* Custom Scrollbar */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #05050a; 
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #1e2235; 
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #0066ff; 
      }
      
      /* Blue Glow effect */
      .blue-glow {
        box-shadow: 0 0 20px rgba(0, 102, 255, 0.15);
      }
      .blue-glow:hover {
        box-shadow: 0 0 30px rgba(0, 102, 255, 0.25);
      }
    </style>
